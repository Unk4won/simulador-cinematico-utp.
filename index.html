          </div>
          <h1>Simulador Cinemático</h1>
          <p>Teorema del Trabajo y la Energía</p>
        </header>

        <div class="control-grid">
          <div class="input-box">
            <label for="distancia">Distancia de derrape (m)</label>
            <input
              type="number"
              id="distancia"
              placeholder="Ej. 40"
              min="0.1"
              step="0.5"
            />
            <span class="error-tip" id="error-msg"
              >Ingrese un valor válido (> 0)</span
            >
          </div>

          <div class="input-box">
            <label for="clima">Condición de la Vía</label>
            <select id="clima">
              <option value="0.75">Pista Seca (µk = 0.75)</option>
              <option value="0.40">Pista Húmeda (µk = 0.40)</option>
            </select>
          </div>

          <button class="neu-btn" onclick="ejecutarSimulacion()">
            Simular Frenado
          </button>
        </div>

        <!-- Resultados -->
        <div class="result-container hidden" id="resultado-box">
          <div class="result-metric">
            <span>Velocidad Base (S.I.)</span>
            <h3><span id="vel_ms">0.00</span> m/s</h3>
          </div>
          <div class="result-metric accent-glow">
            <span>Velocidad Estimada</span>
            <h3><span id="vel_kmh">0.00</span> km/h</h3>
          </div>
        </div>
      </main>

      <!-- Pista de Simulación Visual del Auto -->
      <section class="simulation-stage blur-effect">
        <div class="stage-title">Simulación Gráfica del Tránsito</div>
        <div class="road-track">
          <div class="skid-marks" id="huella-frenado"></div>
          <!-- Gráfico vectorial animado del vehículo con acentos UTP -->
          <div class="car-object" id="vehiculo-animado">
            <svg
              viewBox="0 0 120 50"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <path
                d="M10 32C10 27 15 22 25 21L37 15C42 12 48 10 55 10H80C87 10 93 12 98 15L108 21C115 22 118 27 118 32V38C118 41 115 43 112 43H16C13 43 10 41 10 38V32Z"
                fill="#b50d30"
              />
              <path
                d="M38 18L46 12H76L84 18H38Z"
                fill="#121212"
                fill-opacity="0.8"
              />
              <circle
                cx="32"
                cy="41"
                r="8"
                fill="#1A1A1A"
                stroke="#333"
                stroke-width="2"
              />
              <circle
                cx="94"
                cy="41"
                r="8"
                fill="#1A1A1A"
                stroke="#333"
                stroke-width="2"
              />
              <rect x="112" y="32" width="4" height="4" fill="#FFA500" />
            </svg>
          </div>
          <div class="finish-line"></div>
        </div>
        <div class="stage-info" id="estado-pista-txt">Listo para simular</div>
      </section>

      <footer class="author-credits blur-effect">
        <p>
          Diseño y Desarrollo:
          <span class="highlight-author">Adriel Alberto Flores Isava</span>
        </p>
        <p class="credits-sub">Ingeniería de Sistemas e Informática - UTP</p>
      </footer>
    </div>

    <script src="simulador.js"></script>
  </body>
</html>
